# Netlify config for the Vite SPA (frontend lives in web/).
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes (e.g. /clients, /admin) resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set the following environment variables in the Netlify dashboard (Site
# settings → Environment variables); they are baked into the build:
#   VITE_API_URL            = https://itineraryplanner-api.onrender.com
#   VITE_AUTH0_DOMAIN       = your-tenant.us.auth0.com
#   VITE_AUTH0_CLIENT_ID    = <SPA client id>
#   VITE_AUTH0_AUDIENCE     = https://api.itineraryplanner
#   VITE_AUTH0_ROLES_CLAIM  = https://itineraryplanner/roles
