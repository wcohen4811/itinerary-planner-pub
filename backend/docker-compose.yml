services:
  db:
    image: postgres:16-alpine
    container_name: itineraryplanner-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: itineraryplanner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - itineraryplanner_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d itineraryplanner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  itineraryplanner_postgres_data:
